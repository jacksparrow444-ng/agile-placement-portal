<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Feed | Placement & Internship</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="student_job_feed.css">
</head>
<body>

<div class="dashboard-wrapper">
    <aside class="sidebar">
        <div class="logo-area">
            <h2>Placement &<span> Internship</span></h2>
        </div>
        <nav class="nav-menu">
            <a href="student_job_feed.html" class="nav-item active" id="nav-feed"><i class="fas fa-th-large"></i> Job Feed</a>
            <a href="student_applications.html" class="nav-item" id="nav-apps"><i class="fas fa-layer-group"></i> My Applications</a>
            <a href="student_profile.html" class="nav-item" id="nav-profile"><i class="fas fa-user-circle"></i> My Profile</a>
            <a href="student_notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications</a>
            <a href="student_helpdesk.html" class="nav-item"><i class="fas fa-info-circle"></i> Info Hub</a>
        </nav>
        <div class="logout-area">
            <a href="index.html" class="nav-item text-danger" onclick="localStorage.clear()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header fade-in-up">
            <div class="header-text">
                <h1>Explore Opportunities</h1>
                <p>Find and apply for the best internships and placement drives.</p>
            </div>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by role or company...">
            </div>
        </header>

        <div id="announcementBanner" style="display: none; background: #e0e7ff; color: #3730a3; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border-left: 4px solid #4f46e5;">
            <strong id="annTitle" style="font-size: 15px; display: block; margin-bottom: 5px;"></strong>
            <span id="annMsg" style="font-size: 13px;"></span>
        </div>

        <div class="feed-layout fade-in-up delay-1">
            <aside class="filters-sidebar">
                <div class="filter-group">
                    <h3><i class="fas fa-filter"></i> Filters</h3>
                </div>
                
                <div class="filter-group">
                    <h4>Job Type</h4>
                    <label class="custom-checkbox">
                        <input type="checkbox" class="filter-type" value="internship"> <span class="checkmark"></span> Internship
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" class="filter-type" value="full-time"> <span class="checkmark"></span> Full-Time
                    </label>
                </div>

                <div class="filter-group">
                    <h4>Work Mode</h4>
                    <label class="custom-checkbox">
                        <input type="checkbox" class="filter-mode" value="remote"> <span class="checkmark"></span> Remote
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" class="filter-mode" value="office"> <span class="checkmark"></span> In-Office
                    </label>
                </div>

                <div class="filter-group">
                    <h4>Location</h4>
                    <select id="locationFilter" class="premium-select">
                        <option value="all">Any Location</option>
                    </select>
                </div>
            </aside>

            <div class="jobs-grid" id="jobsContainer">
                </div>
        </div>
    </main>
</div>

<div class="modal-overlay" id="applyModal" style="display: none;">
    <div class="modal-box slide-down">
        <div class="modal-header">
            <h2>Apply for Role</h2>
            <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="apply-info">
            <p>Applying for: <strong id="modalJobTitle" style="color: #0ea5e9;">Role Name</strong></p>
            <p class="hint-text"><i class="fas fa-check-circle"></i> Your profile details will be attached.</p>
        </div>
        <form id="applyJobForm" class="premium-form">
            <input type="hidden" id="applyJobId">
            <div class="input-group" style="margin-top: 20px;">
                <label>Why should we hire you?</label>
                <textarea id="coverLetter" rows="4" placeholder="Highlight your skills..." required></textarea>
            </div>
            <button type="submit" class="btn-primary-glow" style="width: 100%; justify-content: center; margin-top: 10px;">
                <i class="fas fa-paper-plane"></i> Submit Application
            </button>
        </form>
    </div>
</div>

<script>
    let allJobs = []; 

    // 1. Fetch data from server
    async function loadJobs() {
        try {
            const response = await fetch('http://localhost:3000/api/student/available-jobs');
            const data = await response.json();
            
            if (data.success) {
                allJobs = data.jobs; 
                updateLocationDropdown(); 
                applyFilters(); 
            }
        } catch (err) { 
            console.error("Fetch Error:", err); 
        }
    }

    async function loadAnnouncements() {
        try {
            const res = await fetch('http://localhost:3000/api/public/announcements');
            const data = await res.json();
            if(data.success && data.announcements.length > 0) {
                const valid = data.announcements.filter(a => a.audience === 'all' || a.audience === 'students');
                if(valid.length > 0) {
                    document.getElementById('annTitle').innerHTML = '<i class="fas fa-bullhorn"></i> ' + valid[0].title;
                    document.getElementById('annMsg').innerText = valid[0].message;
                    document.getElementById('announcementBanner').style.display = 'block';
                }
            }
        } catch(e) {}
    }

    function updateLocationDropdown() {
        const select = document.getElementById('locationFilter');
        const uniqueLocations = [...new Set(allJobs.map(job => job.location?.trim()))].filter(l => l);
        
        let options = '<option value="all">Any Location</option>';
        uniqueLocations.forEach(loc => {
            options += `<option value="${loc}">${loc}</option>`;
        });
        select.innerHTML = options;
    }

    function applyFilters() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const selectedLocation = document.getElementById('locationFilter').value;
        const selectedTypes = Array.from(document.querySelectorAll('.filter-type:checked')).map(cb => cb.value.toLowerCase());
        const selectedModes = Array.from(document.querySelectorAll('.filter-mode:checked')).map(cb => cb.value.toLowerCase());

        const filtered = allJobs.filter(job => {
            const matchesSearch = job.jobTitle.toLowerCase().includes(searchTerm) || 
                                 job.companyName.toLowerCase().includes(searchTerm);
            const matchesLocation = (selectedLocation === 'all') || (job.location === selectedLocation);
            const matchesType = selectedTypes.length === 0 || selectedTypes.includes(job.jobType?.toLowerCase());
            const matchesMode = selectedModes.length === 0 || selectedModes.includes(job.workMode?.toLowerCase());

            return matchesSearch && matchesLocation && matchesType && matchesMode;
        });
        renderJobs(filtered);
    }

    function renderJobs(jobs) {
        const container = document.getElementById('jobsContainer');
        container.innerHTML = jobs.length ? '' : '<div style="grid-column:1/-1; text-align:center; padding:50px;"><h3>No matching jobs found.</h3></div>';
        
        jobs.forEach(job => {
            const letter = job.companyName.charAt(0).toUpperCase();
            container.innerHTML += `
                <div class="job-card">
                    <div class="card-header">
                        <div class="company-logo" style="background: #e0f2fe; padding: 10px; border-radius: 8px; font-weight: bold; color: #0369a1; width:40px; text-align:center;">${letter}</div>
                        <span class="badge" style="background: #0ea5e9; color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px;">Active</span>
                    </div>
                    <div class="card-body">
                        <h2 class="job-title" style="font-size: 18px; margin: 10px 0;">${job.jobTitle}</h2>
                        <p class="company-name" style="color: #64748b; margin-bottom: 10px;">${job.companyName}</p>
                        <div class="job-tags" style="display: flex; flex-wrap: wrap; gap: 8px;">
                            <span class="tag" style="font-size: 12px; background: #f1f5f9; padding: 5px 10px; border-radius: 6px;"><i class="fas fa-map-marker-alt"></i> ${job.location || 'N/A'}</span>
                            <span class="tag" style="font-size: 12px; background: #f1f5f9; padding: 5px 10px; border-radius: 6px;"><i class="fas fa-rupee-sign"></i> ${job.salary}</span>
                            <span class="tag" style="font-size: 12px; background: #fee2e2; color: #ef4444; padding: 5px 10px; border-radius: 6px;"><i class="fas fa-graduation-cap"></i> ${job.eligibility} CGPA</span>
                            ${job.jobType ? `<span class="tag" style="font-size: 12px; background: #e0e7ff; color: #4338ca; padding: 5px 10px; border-radius: 6px; text-transform: capitalize;"><i class="fas fa-briefcase"></i> ${job.jobType}</span>` : ''}
                            ${job.workMode ? `<span class="tag" style="font-size: 12px; background: #fef08a; color: #b45309; padding: 5px 10px; border-radius: 6px; text-transform: capitalize;"><i class="fas fa-building"></i> ${job.workMode}</span>` : ''}
                        </div>
                    </div>
                    <div class="card-footer" style="margin-top: 15px;">
                        <button class="btn-outline-premium" onclick="openApplyModal(${job.id}, '${job.jobTitle}')" style="width: 100%; border: 2px solid #0ea5e9; color: #0ea5e9; padding: 10px; border-radius: 8px; background: transparent; cursor: pointer; font-weight: 600; transition: 0.3s;">Apply Now</button>
                    </div>
                </div>`;
        });
    }

    function openApplyModal(id, title) {
        document.getElementById('applyJobId').value = id;
        document.getElementById('modalJobTitle').innerText = title;
        document.getElementById('applyModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('applyModal').style.display = 'none';
        document.getElementById('coverLetter').value = ''; // Reset textarea
    }

    // 🚀 THE MAGIC FIX: Form Submit Event Listener
    document.getElementById('applyJobForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // Ye line page refresh hone se rokegi!

        const user = JSON.parse(localStorage.getItem('currentStudent'));
        if (!user || !user.id) {
            alert("Please login as a student first!");
            window.location.href = 'index.html';
            return;
        }
        
        if (user.status !== 'verified') {
            alert("❌ Your account is pending TPO Verification. You cannot apply to jobs until approved.");
            closeModal();
            return;
        }

        const jobId = document.getElementById('applyJobId').value;
        const coverLetter = document.getElementById('coverLetter').value;

        try {
            const response = await fetch('http://localhost:3000/api/student/apply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    studentId: user.id,
                    jobId: jobId,
                    coverLetter: coverLetter
                })
            });

            const result = await response.json();

            if (result.success) {
                alert("✅ Application Submitted Successfully!");
                closeModal();
                // Redirect to My Applications for immediate status viewing
                window.location.href = 'student_applications.html';
            } else {
                alert("❌ " + result.message); // Show alert if CGPA is lower than required eligibility
            }
        } catch (err) {
            console.error("Submission Error:", err);
            alert("Server Error! Make sure your Node.js server is running.");
        }
    });

    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('locationFilter').addEventListener('change', applyFilters);
    document.querySelectorAll('.filter-type, .filter-mode').forEach(el => {
        el.addEventListener('change', applyFilters);
    });

    window.onload = () => { loadJobs(); loadAnnouncements(); };
</script>
</body>
</html>
