<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Placement Portal</title>
    <link rel="stylesheet" href="student_interface.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: #f1f5f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;">
    <div style="background: white; padding: 40px; border-radius: 12px; max-width: 450px; width: 100%; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);">
        <h2 style="text-align: center; color: #1a237e; margin-top: 0;">Reset Password</h2>
        <p style="text-align: center; color: #64748b; margin-bottom: 25px; font-size: 14px;">Enter your registered details to reset your password and restore access to your portal account.</p>
        
        <form id="resetForm">
            <div style="margin-bottom: 15px;" id="roleSelectionDiv">
                <label style="display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; color: #334155;">Select Role</label>
                <select id="userRole" required style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; outline: none;">
                    <option value="student">Student</option>
                    <option value="company">Company / Recruiter</option>
                    <option value="tpo">TPO Staff</option>
                </select>
            </div>

            <div style="margin-bottom: 15px;">
                <label id="identityLabel" style="display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; color: #334155;">Registered Email</label>
                <input type="text" id="identityInput" placeholder="e.g. student@college.edu" required style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; box-sizing: border-box; outline: none;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; color: #334155;">New Password</label>
                <div style="position: relative;">
                    <input type="password" id="newPassword" placeholder="Minimum 8 characters" required minlength="8" pattern="^[^'&quot;=<>;\\]+$" title="No injection symbols allowed" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; box-sizing: border-box; padding-right: 40px; outline: none;">
                    <i class="fas fa-eye-slash" id="togglePassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #64748b;" onclick="togglePasswordVisibility('newPassword', 'togglePassword')"></i>
                </div>
            </div>

            <button type="submit" style="width: 100%; background: #1a237e; color: white; border: none; padding: 14px; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;">Reset Database Password</button>
            <p style="text-align: center; margin-top: 20px;"><a href="index.html" style="color: #0369a1; text-decoration: none; font-weight: 500; font-size: 14px;"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
        </form>
    </div>

    <script>
        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const roleQuery = urlParams.get('role');
        const roleSelect = document.getElementById('userRole');

        function updateUIForRole(role) {
            if(role === 'tpo') {
                document.getElementById('identityInput').placeholder = 'Enter Placement Cell ID (e.g. TPO123)';
                document.getElementById('identityLabel').innerText = 'Placement Cell Staff ID';
            } else if (role === 'company') {
                document.getElementById('identityInput').placeholder = 'e.g. hr@company.com';
                document.getElementById('identityLabel').innerText = 'Official Corporate Email';
            } else {
                document.getElementById('identityInput').placeholder = 'e.g. student@college.edu';
                document.getElementById('identityLabel').innerText = 'Registered Institutional Email';
            }
        }

        if (roleQuery) {
            roleSelect.value = roleQuery;
            document.getElementById('roleSelectionDiv').style.display = 'none';
            updateUIForRole(roleQuery);
        } else {
            updateUIForRole(roleSelect.value);
        }

        roleSelect.addEventListener('change', function() {
            updateUIForRole(this.value);
        });

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const role = document.getElementById('userRole').value;
            const identity = document.getElementById('identityInput').value.trim();
            const newPassword = document.getElementById('newPassword').value;

            try {
                const response = await fetch('http://localhost:3000/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role, identity, newPassword })
                });

                const result = await response.json();
                if(result.success) {
                    alert("✅ Password Reset Successfully! You can now login with your new credentials.");
                    if(role === 'student') window.location.href = 'student_interface.html';
                    else if(role === 'company') window.location.href = 'company_interface.html';
                    else window.location.href = 'tpo_auth.html';
                } else {
                    alert("❌ Error: " + result.message);
                }
            } catch (err) {
                alert("Server connection error. Please make sure the node server is running.");
            }
        });
    </script>
</body>
</html>
