<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post New Job | Company Portal</title>
    <link rel="stylesheet" href="company_dashboard.css">
</head>
<body style="background:#f4f7fe; font-family: sans-serif;">
    <div style="display:flex; min-height:100vh;">
        <aside style="width:260px; background:#1a237e; color:white; padding:20px;">
            <h2>CompanyPortal</h2>
            <nav style="margin-top:20px;">
                <a href="company_dashboard.html" style="color:white; display:block; padding:10px; text-decoration:none;">Dashboard</a>
                <a href="post_job.html" style="color:white; display:block; padding:10px; background:#283593; text-decoration:none;">Post Job</a>
                <a href="index.html" onclick="localStorage.clear()" style="color:white; display:block; padding:10px; text-decoration:none;">Logout</a>
            </nav>
        </aside>
        <main style="flex:1; padding:40px;">
            <h1>Post New Opportunity</h1>
            <form id="jobForm" style="background:white; padding:30px; border-radius:10px; margin-top:20px;">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                    <div><label>Job Title</label><input type="text" name="jobTitle" required style="width:100%; padding:10px;"></div>
                    <div><label>Job Type</label><select name="jobType" required style="width:100%; padding:10px; border:1px solid #ccc; background:#fff;"><option value="" disabled selected>Select Job Type</option><option value="internship">Internship</option><option value="full-time">Full-Time</option></select></div>
                    <div><label>Work Mode</label><select name="workMode" required style="width:100%; padding:10px; border:1px solid #ccc; background:#fff;"><option value="" disabled selected>Select Work Mode</option><option value="office">In-Office</option><option value="remote">Remote</option></select></div>
                    <div><label>Location</label><input type="text" name="location" required style="width:100%; padding:10px;"></div>
                    <div><label>Salary (LPA)</label><input type="text" name="salary" required style="width:100%; padding:10px;"></div>
                    <div><label>Last Date</label><input type="date" name="lastDate" required style="width:100%; padding:10px;"></div>
                    <div><label>Min CGPA</label><input type="number" step="0.1" name="eligibility" required style="width:100%; padding:10px;"></div>
                    <div><label>Max Active Backlogs</label><input type="number" name="maxBacklogs" value="0" min="0" required style="width:100%; padding:10px;"></div>
                    <div style="grid-column: 1 / -1;"><label>Skills</label><input type="text" name="skills" required style="width:100%; padding:10px;"></div>
                </div>
                <div style="margin-top:20px;"><label>Description</label><textarea name="jobDescription" rows="4" style="width:100%; padding:10px;"></textarea></div>
                <button type="submit" style="margin-top:20px; width:100%; background:#1a237e; color:white; padding:15px; border:none; cursor:pointer;">Publish Job</button>
            </form>
        </main>
    </div>
    <script>
        document.getElementById('jobForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) { alert("Please login first"); window.location.href='index.html'; return; }

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            data.companyId = user.id;

            const res = await fetch('http://localhost:3000/api/company/post-job', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (result.success) { alert("Job Posted!"); window.location.href='company_dashboard.html'; }
            else { alert("Error: " + result.message); }
        });
    </script>
</body>
</html>
