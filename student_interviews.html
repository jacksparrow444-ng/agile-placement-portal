<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Interviews</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="student_job_feed.css">
</head>
<body>
<div class="dashboard-wrapper">
    <aside class="sidebar">
        <div class="logo-area"><h2>Placement &<span> Internship</span></h2></div>
        <nav class="nav-menu">
            <a href="student_job_feed.html" class="nav-item"><i class="fas fa-th-large"></i> Job Feed</a>
            <a href="student_applications.html" class="nav-item"><i class="fas fa-layer-group"></i> My Applications</a>
            <a href="student_interviews.html" class="nav-item active"><i class="fas fa-calendar-check"></i> Interviews</a>
            <a href="student_profile.html" class="nav-item"><i class="fas fa-user-circle"></i> My Profile</a>
            <a href="student_notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications</a>
            <a href="student_helpdesk.html" class="nav-item"><i class="fas fa-info-circle"></i> Info Hub</a>
        </nav>
        <div class="logout-area" style="margin-top:auto; padding:20px;">
            <a href="index.html" class="nav-item text-danger" onclick="localStorage.clear()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </aside>
    <main class="main-content">
        <header class="top-header">
            <div class="header-text">
                <h1>My Interviews</h1>
                <p>Track your scheduled interviews with companies.</p>
            </div>
        </header>
        <div style="padding: 20px;" id="interviewList"></div>
    </main>
</div>
<script>
    async function loadInterviews() {
        const user = JSON.parse(localStorage.getItem('currentStudent'));
        if(!user) return window.location.href='index.html';
        const res = await fetch('/api/student/interviews/' + user.id);
        const data = await res.json();
        const list = document.getElementById('interviewList');
        if(data.success && data.interviews.length > 0) {
            list.innerHTML = data.interviews.map(i => `
                <div style="background:white; padding:20px; border-left:4px solid #6366f1; border-radius:8px; margin-bottom:15px; box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);">
                    <h3 style="margin-top:0; color:#1e293b;">${i.jobTitle} <span style="font-weight:normal; color:#64748b;">at</span> ${i.companyName}</h3>
                    <p style="color:#475569;"><i class="fas fa-calendar-alt"></i> <strong>Date:</strong> ${i.date} &nbsp;&nbsp; <i class="fas fa-clock"></i> <strong>Time:</strong> ${i.time}</p>
                    <a href="${i.link}" target="_blank" style="display:inline-block; margin-top:10px; padding:10px 15px; background:#6366f1; color:white; font-weight:bold; border-radius:6px; text-decoration:none;"><i class="fas fa-video"></i> Join Meeting Link</a>
                </div>
            `).join('');
        } else list.innerHTML = '<p style="color:#64748b;">No scheduled interviews yet.</p>';
    }
    window.onload = loadInterviews;
</script>
</body>
</html>
