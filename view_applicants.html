<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Applicants | Company Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="company_dashboard.css">
    <style>
        .premium-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .premium-table th { background: #f8fafc; padding: 15px; text-align: left; color: #475569; font-weight: 600; font-size: 14px; border-bottom: 1px solid #e2e8f0; }
        .premium-table td { padding: 15px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        .premium-table tr:hover { background: #f8fafc; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; }
        .status-pending { background: #fef08a; color: #854d0e; }
        .status-shortlisted { background: #bfdbfe; color: #1e40af; }
        .status-rejected { background: #fecaca; color: #991b1b; }
        .status-hired { background: #bbf7d0; color: #166534; }
        .action-btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s; margin-right: 5px; }
        .btn-shortlist { background: #3b82f6; color: white; }
        .btn-shortlist:hover { background: #2563eb; }
        .btn-reject { background: #ef4444; color: white; }
        .btn-reject:hover { background: #dc2626; }
        .btn-hire { background: #10b981; color: white; }
        .btn-hire:hover { background: #059669; }
        .resume-link { color: #4f46e5; text-decoration: none; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; }
        .resume-link:hover { text-decoration: underline; }
    </style>
</head>
<body style="background:#f4f7fe; font-family: sans-serif; margin: 0;">
    <div style="display:flex; min-height:100vh;">
        <aside style="width:260px; background:#1a237e; color:white; padding:20px;">
            <h2>CompanyPortal</h2>
            <nav style="margin-top:20px;">
                <a href="company_dashboard.html" style="color:white; display:block; padding:10px; text-decoration:none;">Dashboard</a>
                <a href="post_job.html" style="color:white; display:block; padding:10px; text-decoration:none;">Post Job</a>
                <a href="manage_jobs.html" style="color:white; display:block; padding:10px; background:#283593; text-decoration:none;">Manage Jobs</a>
                <a href="index.html" onclick="localStorage.clear()" style="color:white; display:block; padding:10px; text-decoration:none; margin-top: auto;">Logout</a>
            </nav>
        </aside>
        
        <main style="flex:1; padding:40px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1><a href="manage_jobs.html" style="color: #64748b; text-decoration: none;"><i class="fas fa-arrow-left"></i></a> Applicants for <span id="jobTitleDisplay" style="color: #1a237e;">Job</span></h1>
            </div>
            
            <table class="premium-table">
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Academic Info</th>
                        <th>Skills</th>
                        <th>Resume & Cover Letter</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="applicantsTableBody">
                    <tr><td colspan="6" style="text-align: center; padding: 20px;">Loading applicants...</td></tr>
                </tbody>
            </table>
        </main>
    </div>

    <!-- Cover Letter Modal -->
    <div id="coverLetterModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000;">
        <div style="background: white; padding: 30px; border-radius: 8px; width: 500px; max-width: 90%;">
            <h3 style="margin-top: 0; color: #1e293b; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 15px;">Cover Letter</h3>
            <p id="modalCoverLetterContent" style="color: #475569; line-height: 1.6; white-space: pre-wrap; font-size: 14px; max-height: 300px; overflow-y: auto;"></p>
            <div style="text-align: right; margin-top: 20px;">
                <button onclick="closeCoverLetter()" style="padding: 8px 16px; border: none; background: #e2e8f0; color: #475569; border-radius: 4px; cursor: pointer; font-weight: 600;">Close</button>
            </div>
        </div>
    </div>

    <script>
        // Get jobId from URL query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('jobId');

        if (!jobId) {
            alert("No job selected!");
            window.location.href = 'manage_jobs.html';
        }

        async function loadApplicants() {
            try {
                const response = await fetch(`http://localhost:3000/api/company/view-applicants/${jobId}`);
                const data = await response.json();
                const tbody = document.getElementById('applicantsTableBody');

                if (data.success) {
                    if (data.applicants.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 30px; color: #64748b;">No applications received yet.</td></tr>';
                        return;
                    }

                    tbody.innerHTML = '';
                    data.applicants.forEach(app => {
                        const statusClass = `status-${app.status.toLowerCase()}`;
                        const resumeHtml = app.resumePath ? 
                            `<a href="http://localhost:3000/${app.resumePath}" target="_blank" class="resume-link"><i class="fas fa-file-pdf"></i> View Resume</a>` : 
                            '<span style="color: #94a3b8; font-size: 13px;">No resume</span>';
                        
                        // Action buttons logic based on current status
                        let actionButtons = '';
                        if (app.status === 'pending') {
                            actionButtons = `
                                <button class="action-btn btn-shortlist" onclick="updateStatus(${app.applicationId}, 'shortlisted')">Shortlist</button>
                                <button class="action-btn btn-reject" onclick="updateStatus(${app.applicationId}, 'rejected')">Reject</button>
                            `;
                        } else if (app.status === 'shortlisted') {
                            actionButtons = `
                                <button class="action-btn btn-hire" onclick="updateStatus(${app.applicationId}, 'hired')">Hire</button>
                                <button class="action-btn btn-reject" onclick="updateStatus(${app.applicationId}, 'rejected')">Reject</button>
                            `;
                        } else {
                            actionButtons = `<span style="color: #94a3b8; font-size: 12px; font-style: italic;">No actions available</span>`;
                        }

                        tbody.innerHTML += `
                            <tr>
                                <td>
                                    <strong>${app.studentName}</strong><br>
                                    <small style="color: #64748b;">${app.email}</small>
                                </td>
                                <td>
                                    <i class="fas fa-star" style="color: #f59e0b; font-size: 12px;"></i> <strong>${app.cgpa}</strong> CGPA<br>
                                    <small style="color: #64748b;">Backlogs: ${app.activeBacklogs || 0}</small>
                                </td>
                                <td>
                                    <div style="font-size: 13px; color: #475569; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${app.skills}">
                                        ${app.skills || 'N/A'}
                                    </div>
                                </td>
                                <td>
                                    ${resumeHtml}<br>
                                    <button onclick="viewCoverLetter(\`${app.coverLetter.replace(/"/g, '&quot;')}\`)" style="margin-top: 5px; background: none; border: 1px solid #cbd5e1; padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; color: #475569;"><i class="fas fa-align-left"></i> Cover Letter</button>
                                </td>
                                <td><span class="status-badge ${statusClass}">${app.status.charAt(0).toUpperCase() + app.status.slice(1)}</span></td>
                                <td>${actionButtons}</td>
                            </tr>
                        `;
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: red;">Failed to load data.</td></tr>';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('applicantsTableBody').innerHTML = '<tr><td colspan="6" style="text-align: center; color: red;">Server connection error.</td></tr>';
            }
        }

        async function updateStatus(applicationId, status) {
            if(!confirm(`Are you sure you want to mark this applicant as ${status}?`)) return;

            try {
                const response = await fetch('http://localhost:3000/api/company/update-application-status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ applicationId, status })
                });
                
                const result = await response.json();
                if (result.success) {
                    loadApplicants(); // Reload the table
                } else {
                    alert('Error updating status');
                }
            } catch (err) {
                alert('Server error while updating status');
            }
        }

        function viewCoverLetter(content) {
            document.getElementById('modalCoverLetterContent').innerText = content || "No cover letter provided.";
            document.getElementById('coverLetterModal').style.display = 'flex';
        }

        function closeCoverLetter() {
            document.getElementById('coverLetterModal').style.display = 'none';
        }

        window.onload = loadApplicants;
    </script>
</body>
</html>
