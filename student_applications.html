<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Applications | Placement & Internship</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="student_applications.css">
</head>
<body>

<div class="dashboard-wrapper">
    <aside class="sidebar">
        <div class="logo-area">
            <h2>Placement &<span> Internship</span></h2>
        </div>
        <nav class="nav-menu">
            <a href="student_job_feed.html" class="nav-item"><i class="fas fa-th-large"></i> Job Feed</a>
            <a href="student_applications.html" class="nav-item active"><i class="fas fa-layer-group"></i> My Applications</a>
            <a href="student_notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications</a>
            <a href="student_helpdesk.html" class="nav-item"><i class="fas fa-info-circle"></i> Info Hub</a>
            <a href="student_profile.html" class="nav-item"><i class="fas fa-user-circle"></i> My Profile</a>
        </nav>
        <div class="logout-area">
            <a href="index.html" class="nav-item text-danger" onclick="localStorage.clear()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header fade-in-up">
            <div class="header-text">
                <h1>My Selection Journey</h1>
                <p>Track your interview schedules and final placement results.</p>
            </div>
            <div class="app-stats">
                <div class="stat-pill">Total Applied: <span id="totalCount">0</span></div>
                <div class="stat-pill text-green">Active: <span id="activeCount">0</span></div>
            </div>
        </header>

        <div class="table-card fade-in-up delay-1">
            <table class="premium-table">
                <thead>
                    <tr>
                        <th>Company & Role</th>
                        <th>Applied Date</th>
                        <th>Status</th>
                        <th>Final Result</th>
                    </tr>
                </thead>
                <tbody id="resultsTableBody">
                    <tr><td colspan="4" style="text-align:center;">Loading applications...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<script>
    async function fetchApplications() {
        const user = JSON.parse(localStorage.getItem('currentStudent'));
        if (!user || !user.id) {
            window.location.href = 'index.html';
            return;
        }

        try {
            const response = await fetch(`/api/student/my-applications/${user.id}`);
            const data = await response.json();
            
            const tableBody = document.getElementById('resultsTableBody');
            tableBody.innerHTML = '';
            
            // Stats update
            document.getElementById('totalCount').innerText = data.applications.length;
            let activeCount = 0;

            if (!data.applications || data.applications.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px; color:#64748b;">No applications found.</td></tr>';
                return;
            }

            data.applications.forEach(app => {
                let statusClass = 'pending';
                let resultText = 'Awaited';
                let isActive = false;
                
                if(app.status === 'pending') {
                    isActive = true;
                } else if(app.status === 'shortlisted') {
                    statusClass = 'shortlisted';
                    resultText = 'In Progress';
                    isActive = true;
                } else if(app.status === 'hired' || app.status === 'approved') {
                    statusClass = 'hired';
                    resultText = 'Selected 🎉';
                } else if(app.status === 'rejected') {
                    statusClass = 'rejected';
                    resultText = 'Not Selected';
                }
                
                if(isActive) activeCount++;

                const firstLetter = app.companyName.charAt(0);
                
                let withdrawButtonStr = '';
                if(app.status === 'pending') {
                    withdrawButtonStr = `<button onclick="withdrawApp(${app.applicationId})" style="margin-top: 10px; background: #fef2f2; border: 1px solid #fca5a5; color: #ef4444; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; transition: 0.2s;"><i class="fas fa-times-circle"></i> Withdraw</button>`;
                }

                tableBody.innerHTML += `
                    <tr>
                        <td>
                            <div class="company-brand">
                                <div class="mini-logo">${firstLetter}</div>
                                <div>
                                    <div class="role-name">${app.jobTitle}</div>
                                    <div class="comp-name">${app.companyName}</div>
                                    ${withdrawButtonStr}
                                </div>
                            </div>
                        </td>
                        <td>${app.appliedDate}</td>
                        <td><span class="status-badge ${statusClass}">${app.status.toUpperCase()}</span></td>
                        <td>
                            <button class="btn-view">${resultText}</button>
                            ${app.offerUrl ? `<br><a href="${app.offerUrl}" target="_blank" style="display:inline-block; margin-top:5px; background:#0284c7; color:white; padding:4px 8px; border-radius:4px; text-decoration:none; font-size:11px; width:max-content;"><i class="fas fa-file-download"></i> View Offer</a>` : ''}
                        </td>
                    </tr>
                `;
            });
            document.getElementById('activeCount').innerText = activeCount;
        } catch (err) {
            console.error(err);
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">Server Error!</td></tr>';
        }
    }

    async function withdrawApp(appId) {
        if (!confirm("Are you sure you want to withdraw this application? This cannot be undone.")) return;
        
        try {
            const response = await fetch(`/api/student/withdraw-application/${appId}`, {
                method: 'DELETE'
            });
            const result = await response.json();
            
            if (result.success) {
                // Application withdrawn, reload the page
                fetchApplications(); // Refresh the list without reloading the whole page
            } else {
                alert(result.message || 'Error withdrawing application.');
            }
        } catch (err) {
            console.error(err);
            alert('Server error while withdrawing.');
        }
    }

    window.onload = fetchApplications;
</script>
</body>
</html>
