<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Requests | TPO Staff Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="tpo_shared.css">
</head>
<body>

<div class="dashboard-wrapper">
    <aside class="sidebar">
        <div class="logo-area">
            <h2>TPO<span>Portal</span></h2>
            <p class="role-tag">Staff Dashboard</p>
        </div>
        <nav class="nav-menu">
            <a href="tpo_dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i> Overview</a>
            <a href="tpo_manage_drives.html" class="nav-item"><i class="fas fa-bullhorn"></i> Manage Drives</a>
            <a href="tpo_requests.html" class="nav-item active"><i class="fas fa-building-circle-check"></i> Company Requests</a>
            <a href="tpo_student_verify.html" class="nav-item"><i class="fas fa-user-check"></i> Student Verification</a>
            <a href="#" class="nav-item"><i class="fas fa-poll-h"></i> Publish Results</a>
        </nav>
        <div class="sidebar-footer">
            <a href="index.html" class="logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header fade-in">
            <div class="header-text">
                <h1>Company Access Requests</h1>
                <p>Verify and approve companies to allow them to post jobs.</p>
            </div>
        </header>

        <div class="content-card fade-in">
            <div class="card-header">
                <h2>New Requests</h2>
                <span class="badge-count" id="requestBadge">0 Pending</span>
            </div>
            
            <table class="premium-table">
                <thead>
                    <tr>
                        <th>Company</th>
                        <th>HR Details</th>
                        <th>Contact</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="requestTableBody">
                    </tbody>
            </table>
        </div>
    </main>
</div>

<div id="toast" class="toast">Action processed!</div>

<script>
    // 1. Fetch unverified companies from the backend
    async function loadRequests() {
        try {
            const response = await fetch('http://localhost:3000/api/tpo/pending-companies');
            const result = await response.json();

            const tableBody = document.getElementById('requestTableBody');
            const badge = document.getElementById('requestBadge');
            
            tableBody.innerHTML = ''; 
            badge.innerText = `${result.companies.length} Pending`;

            if (result.companies.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 30px; color: #667085;">No pending company requests at the moment.</td></tr>';
                return;
            }

            result.companies.forEach(company => {
                const firstChar = company.companyName.charAt(0).toUpperCase();
                tableBody.innerHTML += `
                    <tr id="row-${company.id}">
                        <td>
                            <div class="comp-profile">
                                <div class="icon-circle blue">${firstChar}</div>
                                <strong>${company.companyName}</strong>
                            </div>
                        </td>
                        <td>
                            <div style="font-size: 14px;">${company.email}</div>
                            <small style="color: #667085;">HR: ${company.hrName}</small>
                        </td>
                        <td>${company.contact}</td>
                        <td>
                            <button class="btn-approve" onclick="processRequest(${company.id}, '${company.companyName}', 'verified')">Approve</button>
                            <button class="btn-reject" onclick="processRequest(${company.id}, '${company.companyName}', 'rejected')">Reject</button>
                        </td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error("Error fetching data:", error);
        }
    }

    // 2. Handle Approve/Reject actions
    async function processRequest(companyId, compName, action) {
        const row = document.getElementById(`row-${companyId}`);
        const toast = document.getElementById('toast');
        
        // Visual feedback during processing
        row.style.opacity = '0.5';
        row.style.pointerEvents = 'none';

        try {
            const response = await fetch('http://localhost:3000/api/tpo/verify-company', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ companyId, action })
            });

            const result = await response.json();

            if (result.success) {
                // Show custom toast message
                toast.innerText = action === 'verified' ? compName + " Approved!" : compName + " Rejected!";
                toast.style.borderLeft = action === 'verified' ? "5px solid #10b981" : "5px solid #ef4444";
                
                row.classList.add('fade-out');
                setTimeout(() => {
                    row.remove();
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 3000);
                    loadRequests(); // Refresh the list and count
                }, 300);
            }
        } catch (error) {
            alert("Error: Could not connect to the server.");
            row.style.opacity = '1';
            row.style.pointerEvents = 'auto';
        }
    }

    // Load data on page entry
    window.onload = loadRequests;
</script>

<style>
    /* Custom Styling for the integrated table */
    .comp-profile { display: flex; align-items: center; gap: 12px; }
    .icon-circle { width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; }
    .blue { background: #4285F4; }
    .badge-count { background: #fee2e2; color: #ef4444; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 700; }
    .fade-out { opacity: 0; transform: translateX(20px); transition: 0.3s; }
    
    /* Toast Notification styles */
    .toast {
        position: fixed; bottom: 20px; right: 20px;
        background: white; padding: 15px 25px; border-radius: 8px;
        box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        display: none; z-index: 1000;
    }
    .toast.show { display: block; animation: slideUp 0.4s ease forwards; }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>

</body>
</html>
